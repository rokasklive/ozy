version: "2"

run:
  tests: true

linters:
  # Start from the standard set (errcheck, govet, ineffassign, staticcheck,
  # unused) and add high-signal checks. Security and error-wrapping linters are
  # included because Ozy handles secrets and relies on structured errors
  # (SPEC.md §16, §9.3).
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - gosec
    - misspell
    - revive
    - unconvert
    - unparam
  settings:
    errcheck:
      # Best-effort diagnostic writes to status/stderr have no actionable error.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - io.WriteString
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: var-declaration
        - name: var-naming
  exclusions:
    generated: lax
    rules:
      # Reading a user-specified config path is intended behavior, not a file
      # inclusion vulnerability.
      - path: internal/config/config\.go
        linters:
          - gosec
        text: "G304"
      # Tests use relaxed rules.
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/rokasklive/ozy

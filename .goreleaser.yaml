version: 2

builds:
  - id: ozy
    main: ./cmd/ozy
    binary: ozy
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}

  - id: ozy-install
    main: ./cmd/ozy-install
    binary: ozy-install
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}

  - id: ozy-bench
    main: ./cmd/ozy-bench
    binary: ozy-bench
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: bundle
    ids: [ozy, ozy-install, ozy-bench]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: tar.gz
    format_overrides:
      - goos: windows
        formats: zip

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

sboms:
  - id: source
    artifacts: source
    documents:
      - "{{ .ProjectName }}_{{ .Version }}_sbom.spdx.json"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  prerelease: auto
  header: |
    > **Ozy** — the local agent tool broker.
